site:
  name: PrivOcto
  site: 'https://privocto.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: 'uYEWlkS4gA3cYgv5O7mW_Cqm48iJA18zWFHuc2goOrk'

# Default SEO metadata - Optimized for search engines and social sharing
metadata:
  title:
    default: PrivOcto - Priv-Standard, Octo-Stability.
    template: '%s'
  description: 'PrivOcto: Secure AI agents featuring a local de-identification layer. We protect enterprise data by scrubbing sensitive info locally before cloud processing, combining air-gapped privacy with cutting-edge LLM intelligence.'
  keywords:
    - Privacy-Preserving AI Agent   
    - Local De-identification Layer  
    - Hybrid Private AI Architecture 
    - Sensitive Data Scrubbing       
    - PII Redaction for LLMs         
    - Secure Cloud-Edge AI          
    - Zero-Trust AI Integration      
    - Privacy-First Prompt Engineering 
    - Enterprise Data Sovereignty    
    - Local LLM Pre-processing       
    - Compliance-Ready AI Agents      
  robots:
    index: true
    follow: true
  openGraph:
    site_name: PrivOcto
    images:
      - url: '~/assets/images/local-ai-agent-edge-server-hardware.webp'
        width: 1200
        height: 630
        alt: PrivOcto - Enterprise AI Infrastructure
    type: website
    locale: en_US
  twitter:
    handle: '@privocto'
    site: '@privocto'
    cardType: summary_large_image
    image: '~/assets/images/local-ai-agent-edge-server-hardware.webp'

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
        follow: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false
        follow: false

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

# Analytics Configuration
analytics:
  vendors:
    googleAnalytics:
      id: null # Set via environment variable PUBLIC_GOOGLE_ANALYTICS_ID (e.g., G-XXXXXXXXXX)
      partytown: false

ui:
  theme: 'system'
