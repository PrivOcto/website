site:
  name: LocalAI Agent
  site: 'https://localaiagent.tech'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: 'uYEWlkS4gA3cYgv5O7mW_Cqm48iJA18zWFHuc2goOrk'

# Default SEO metadata - Optimized for search engines and social sharing
metadata:
  title:
    default: LocalAI Agent - Enterprise AI Infrastructure & Agents
    template: '%s'
  description: 'LocalAI Agent helps enterprises deploy AI models locally with complete data privacy and low latency.'
  keywords:
    - local AI
    - enterprise AI
    - AI agents
    - local LLM deployment
    - private AI infrastructure
    - edge AI
    - AI security
    - self-hosted AI
    - enterprise machine learning
    - AI data privacy
  robots:
    index: true
    follow: true
  openGraph:
    site_name: LocalAI Agent
    images:
      - url: '~/assets/images/local-ai-agent-edge-server-hardware.webp'
        width: 1200
        height: 630
        alt: LocalAI Agent - Enterprise AI Infrastructure
    type: website
    locale: en_US
  twitter:
    handle: '@localai67177'
    site: '@localai67177'
    cardType: summary_large_image
    image: '~/assets/images/local-ai-agent-edge-server-hardware.webp'

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
        follow: true

    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false
        follow: false

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

# Analytics Configuration
analytics:
  vendors:
    googleAnalytics:
      id: null # Set via environment variable PUBLIC_GOOGLE_ANALYTICS_ID (e.g., G-XXXXXXXXXX)
      partytown: false

ui:
  theme: 'system'
